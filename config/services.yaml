# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.uploads_directory: '%kernel.project_dir%/public/uploads'
    app.private_uploads_directory: '%kernel.project_dir%/var/private/uploads'
    env(TELEGRAM_BOT_TOKEN): ''
    env(TELEGRAM_CHAT_ID): ''
    env(SBP_PAYMENT_URL_TEMPLATE): ''
    env(MAILER_DSN): 'null://null'
    env(MAILER_FROM): ''
    env(APP_SITE_URL): ''
    env(ADMIN_EMAIL): ''
    env(ADMIN_PASSWORD): ''
    env(OM_PLAYER_SCRIPT_URL): 'https://music.arturlun.ru/build/player/om-player.iife.js'
    env(OM_PLAYER_API_BASE): 'https://music.arturlun.ru/api/v1'
    env(CONTENT_INSTAGRAM_PATH): ''
    env(CONTENT_GOOGLE_PHOTOS_PATH): ''
    app.site_url: ''
    app.sbp_payment_url_template: ''
    app.om_player_script_url: 'https://music.arturlun.ru/build/player/om-player.iife.js'
    app.om_player_api_base: 'https://music.arturlun.ru/api/v1'
    app.content_instagram_path: ''
    app.content_google_photos_path: ''

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'

    App\Seo\SeoMetadataFactory:
        arguments:
            $siteUrl: '%env(default:app.site_url:APP_SITE_URL)%'
            $projectDir: '%kernel.project_dir%'

    App\Service\CaseMediaEmbedFactory:
        arguments:
            $omPlayerScriptUrl: '%env(default:app.om_player_script_url:OM_PLAYER_SCRIPT_URL)%'
            $omPlayerApiBase: '%env(default:app.om_player_api_base:OM_PLAYER_API_BASE)%'

    App\Service\ChronicleMediaEmbedFactory:
        arguments:
            $omPlayerScriptUrl: '%env(default:app.om_player_script_url:OM_PLAYER_SCRIPT_URL)%'
            $omPlayerApiBase: '%env(default:app.om_player_api_base:OM_PLAYER_API_BASE)%'

    App\Service\ChronicleUploadStorage:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Twig\UploadPathExtension:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Content\ContentCatalog:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Command\ImportChronicleCorpusCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\InquiryAttachmentStorage:
        arguments:
            $uploadsDirectory: '%app.private_uploads_directory%'

    App\Service\PaymentSbpUrlFactory:
        arguments:
            $envTemplate: '%env(default:app.sbp_payment_url_template:SBP_PAYMENT_URL_TEMPLATE)%'
