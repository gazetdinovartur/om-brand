# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.uploads_directory: '%kernel.project_dir%/public/uploads'
    app.private_uploads_directory: '%kernel.project_dir%/var/private/uploads'
    env(TELEGRAM_BOT_TOKEN): ''
    env(TELEGRAM_CHAT_ID): ''
    env(SBP_PAYMENT_URL_TEMPLATE): ''
    env(MAILER_DSN): 'null://null'
    env(MAILER_FROM): ''
    env(APP_SITE_URL): ''
    env(ADMIN_EMAIL): ''
    env(ADMIN_PASSWORD): ''
    app.site_url: ''
    app.sbp_payment_url_template: ''

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'

    App\Seo\SeoMetadataFactory:
        arguments:
            $siteUrl: '%env(default:app.site_url:APP_SITE_URL)%'
            $projectDir: '%kernel.project_dir%'

    App\Service\InquiryAttachmentStorage:
        arguments:
            $uploadsDirectory: '%app.private_uploads_directory%'

    App\Service\PaymentSbpUrlFactory:
        arguments:
            $envTemplate: '%env(default:app.sbp_payment_url_template:SBP_PAYMENT_URL_TEMPLATE)%'
