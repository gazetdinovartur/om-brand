name: om-brand

services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/app
    working_dir: /app
    env_file:
      - .env
    environment:
      APP_ENV: dev
      DEFAULT_URI: http://nginx
      # Inside the compose network MySQL is `mysql`, not host-mapped 127.0.0.1
      DATABASE_URL: mysql://${MYSQL_USER:-site}:${MYSQL_PASSWORD:-site}@mysql:3306/${MYSQL_DATABASE:-site}?serverVersion=8.0&charset=utf8mb4
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8085:80"
    volumes:
      - .:/app:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  mysql:
    image: mysql:8.0
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-site}
      MYSQL_USER: ${MYSQL_USER:-site}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-site}
    ports:
      - "33085:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER:-site}", "-p${MYSQL_PASSWORD:-site}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
