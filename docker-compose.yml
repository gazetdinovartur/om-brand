name: om-brand

services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/app
    working_dir: /app
    environment:
      APP_ENV: dev
      APP_SECRET: dev_secret_change_me
      DATABASE_URL: mysql://site:site@mysql:3306/site?serverVersion=8.0&charset=utf8mb4
      DEFAULT_URI: http://localhost:8085
      TELEGRAM_BOT_TOKEN: ""
      TELEGRAM_CHAT_ID: ""
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8085:80"
    volumes:
      - .:/app:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: site
      MYSQL_USER: site
      MYSQL_PASSWORD: site
    ports:
      - "33085:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-usite", "-psite"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
